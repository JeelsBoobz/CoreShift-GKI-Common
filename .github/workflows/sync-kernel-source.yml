name: Sync kernel common LTS branches

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: sync-kernel-common-lts
  cancel-in-progress: true

env:
  UPSTREAM_URL: https://android.googlesource.com/kernel/common

jobs:
  # ── Job 1: resolve ───────────────────────────────────────────────────────
  # Reads configs/kernel-sync.json, queries upstream and mirror for branches,
  # and produces a dynamic matrix for the sync job plus a prune list.
  resolve:
    name: Resolve sync matrix
    runs-on: ubuntu-latest
    outputs:
      sync_matrix:    ${{ steps.resolve.outputs.sync_matrix }}
      prune_branches: ${{ steps.resolve.outputs.prune_branches }}
      sync_count:     ${{ steps.resolve.outputs.sync_count }}
      prune_count:    ${{ steps.resolve.outputs.prune_count }}

    steps:
      - name: Disable IPv6
        shell: bash
        run: |
          set -euo pipefail
          sudo sysctl -w net.ipv6.conf.all.disable_ipv6=1
          sudo sysctl -w net.ipv6.conf.default.disable_ipv6=1
          sudo sysctl -w net.ipv6.conf.lo.disable_ipv6=1

      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Resolve matrix
        id: resolve
        shell: bash
        run: |
          set -euo pipefail
          RESULT=$(UPSTREAM_URL="$UPSTREAM_URL" MIRROR_REMOTE="origin" \
            python3 scripts/resolve-sync-matrix.py)
          echo "sync_matrix=$(echo "$RESULT"    | jq -c '.sync_matrix')"    >> "$GITHUB_OUTPUT"
          echo "prune_branches=$(echo "$RESULT" | jq -c '.prune_branches')" >> "$GITHUB_OUTPUT"
          echo "sync_count=$(echo "$RESULT"     | jq -r '.sync_count')"     >> "$GITHUB_OUTPUT"
          echo "prune_count=$(echo "$RESULT"    | jq -r '.prune_count')"    >> "$GITHUB_OUTPUT"

          echo "### Resolved sync matrix" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Branches to sync:** $(echo "$RESULT" | jq -r '.sync_count')" >> "$GITHUB_STEP_SUMMARY"
          echo "**Branches to prune:** $(echo "$RESULT" | jq -r '.prune_count')" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "#### Sync" >> "$GITHUB_STEP_SUMMARY"
          echo "$RESULT" | jq -r '.sync_matrix.include[].ack_branch | "- \(.)"' >> "$GITHUB_STEP_SUMMARY"
          PRUNE_COUNT=$(echo "$RESULT" | jq -r '.prune_count')
          if [ "$PRUNE_COUNT" != "0" ]; then
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "#### Prune" >> "$GITHUB_STEP_SUMMARY"
            echo "$RESULT" | jq -r '.prune_branches[] | "- \(.)"' >> "$GITHUB_STEP_SUMMARY"
          fi

  # ── Job 2: sync ───────────────────────────────────────────────────────────
  # Fetches each branch from upstream and pushes the actual upstream commits
  # to the mirror, preserving ancestry and enabling cross-branch object reuse.
  sync:
    name: Sync ${{ matrix.ack_branch }}
    needs: resolve
    if: needs.resolve.outputs.sync_count != '0'
    runs-on: ubuntu-latest
    timeout-minutes: 60

    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.resolve.outputs.sync_matrix) }}

    steps:
      - name: Disable IPv6
        shell: bash
        run: |
          set -euo pipefail
          sudo sysctl -w net.ipv6.conf.all.disable_ipv6=1
          sudo sysctl -w net.ipv6.conf.default.disable_ipv6=1
          sudo sysctl -w net.ipv6.conf.lo.disable_ipv6=1

      - name: Checkout mirror repo
        uses: actions/checkout@v6
        with:
          # depth=1 is sufficient: auth is set up by the action, and we fetch
          # only the specific branch we need in the steps below.
          fetch-depth: 1

      - name: Configure git
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote add upstream "$UPSTREAM_URL"

      - name: Fetch existing mirror branch
        shell: bash
        run: |
          set -euo pipefail
          # Fetch mirror tip so --force-with-lease has a local ref to validate.
          # Failure is expected on first sync of a branch; ignore it.
          git fetch origin "${{ matrix.ack_branch }}" --depth=1 || true

      - name: Fetch upstream branch
        shell: bash
        run: |
          set -euo pipefail

          ACK_BRANCH="${{ matrix.ack_branch }}"

          git fetch upstream "$ACK_BRANCH" --no-tags

          UPSTREAM_TIP=$(git rev-parse FETCH_HEAD)
          echo "ACK_BRANCH=$ACK_BRANCH"         >> "$GITHUB_ENV"
          echo "UPSTREAM_TIP=$UPSTREAM_TIP"     >> "$GITHUB_ENV"

          KERNEL_VERSION=$(git show FETCH_HEAD:Makefile 2>/dev/null \
            | awk '/^VERSION =/{v=$3} /^PATCHLEVEL =/{p=$3} /^SUBLEVEL =/{s=$3}
                   END{if(v) printf "%s.%s.%s", v, p, s}')
          echo "KERNEL_VERSION=${KERNEL_VERSION:-unknown}" >> "$GITHUB_ENV"

      - name: Check if mirror is already current
        id: uptodate
        shell: bash
        run: |
          set -euo pipefail
          MIRROR_TIP=$(git ls-remote origin "refs/heads/$ACK_BRANCH" | awk '{print $1}')
          if [ "${MIRROR_TIP:-}" = "$UPSTREAM_TIP" ]; then
            echo "already_current=true" >> "$GITHUB_OUTPUT"
            echo "$ACK_BRANCH: mirror already at $UPSTREAM_TIP — skipping."
          fi

      - name: Push upstream commits to mirror
        if: steps.uptodate.outputs.already_current != 'true'
        shell: bash
        run: |
          set -euo pipefail

          # Push the actual upstream commit objects — no synthetic snapshots.
          # Preserves upstream ancestry, commit SHAs, and cross-branch object
          # sharing. --force-with-lease validates against the ref we fetched
          # in "Fetch existing mirror branch", covering both:
          #   - normal fast-forward updates
          #   - first-time branch creation (no existing lease ref → push allowed)
          #   - migration from old synthetic/orphan history
          git push origin "FETCH_HEAD:refs/heads/$ACK_BRANCH" \
            --force-with-lease="refs/heads/$ACK_BRANCH"

          echo "### Synced: $ACK_BRANCH" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Field | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Upstream commit | \`$UPSTREAM_TIP\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Kernel version | \`$KERNEL_VERSION\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Source | [\`$ACK_BRANCH\`]($UPSTREAM_URL/+log/$ACK_BRANCH) |" \
            >> "$GITHUB_STEP_SUMMARY"

  # ── Job 3: prune ──────────────────────────────────────────────────────────
  # Deletes release branches that have aged out of the retention window.
  # LTS branches are never touched — the script only enumerates release branches
  # (pattern: androidXX-X.XX-YYYY-MM) that belong to a managed kernel family.
  prune:
    name: Prune expired release branches
    needs: resolve
    if: needs.resolve.outputs.prune_count != '0'
    runs-on: ubuntu-latest

    steps:
      - name: Disable IPv6
        shell: bash
        run: |
          set -euo pipefail
          sudo sysctl -w net.ipv6.conf.all.disable_ipv6=1
          sudo sysctl -w net.ipv6.conf.default.disable_ipv6=1
          sudo sysctl -w net.ipv6.conf.lo.disable_ipv6=1

      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Delete expired branches
        shell: bash
        env:
          PRUNE_BRANCHES: ${{ needs.resolve.outputs.prune_branches }}
        run: |
          set -euo pipefail
          python3 <<'EOF'
          import json, os, subprocess
          branches = json.loads(os.environ["PRUNE_BRANCHES"])
          for branch in branches:
              print(f"Pruning: {branch}")
              subprocess.run(["git", "push", "origin", "--delete", branch], check=True)
          print(f"Pruned {len(branches)} branch(es).")
          EOF
