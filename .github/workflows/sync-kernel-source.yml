name: Sync kernel common branches

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: sync-kernel-common-lts
  cancel-in-progress: true

env:
  UPSTREAM_URL: https://android.googlesource.com/kernel/common

jobs:
  # ── Job 1: resolve ───────────────────────────────────────────────────────
  # Reads configs/kernel-sync.json, queries upstream and mirror for branches,
  # and produces a dynamic matrix for the sync job plus a prune list.
  resolve:
    name: Resolve sync matrix
    runs-on: ubuntu-latest
    outputs:
      sync_matrix:    ${{ steps.resolve.outputs.sync_matrix }}
      prune_branches: ${{ steps.resolve.outputs.prune_branches }}
      sync_count:     ${{ steps.resolve.outputs.sync_count }}
      prune_count:    ${{ steps.resolve.outputs.prune_count }}

    steps:
      - name: Disable IPv6
        shell: bash
        run: |
          set -euo pipefail
          sudo sysctl -w net.ipv6.conf.all.disable_ipv6=1
          sudo sysctl -w net.ipv6.conf.default.disable_ipv6=1
          sudo sysctl -w net.ipv6.conf.lo.disable_ipv6=1

      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Resolve matrix
        id: resolve
        shell: bash
        run: |
          set -euo pipefail
          RESULT=$(UPSTREAM_URL="$UPSTREAM_URL" MIRROR_REMOTE="origin" \
            python3 scripts/resolve-sync-matrix.py)
          echo "sync_matrix=$(echo "$RESULT"    | jq -c '.sync_matrix')"    >> "$GITHUB_OUTPUT"
          echo "prune_branches=$(echo "$RESULT" | jq -c '.prune_branches')" >> "$GITHUB_OUTPUT"
          echo "sync_count=$(echo "$RESULT"     | jq -r '.sync_count')"     >> "$GITHUB_OUTPUT"
          echo "prune_count=$(echo "$RESULT"    | jq -r '.prune_count')"    >> "$GITHUB_OUTPUT"

          echo "### Resolved sync matrix" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Branches to sync:** $(echo "$RESULT" | jq -r '.sync_count')" >> "$GITHUB_STEP_SUMMARY"
          echo "**Branches to prune:** $(echo "$RESULT" | jq -r '.prune_count')" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "#### Sync" >> "$GITHUB_STEP_SUMMARY"
          echo "$RESULT" | jq -r '.sync_matrix.include[].ack_branch | "- \(.)"' >> "$GITHUB_STEP_SUMMARY"
          PRUNE_COUNT=$(echo "$RESULT" | jq -r '.prune_count')
          if [ "$PRUNE_COUNT" != "0" ]; then
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "#### Prune" >> "$GITHUB_STEP_SUMMARY"
            echo "$RESULT" | jq -r '.prune_branches[] | "- \(.)"' >> "$GITHUB_STEP_SUMMARY"
          fi

  # ── Job 2: sync ───────────────────────────────────────────────────────────
  # Fetches each branch from upstream and pushes the actual upstream commits
  # to the mirror, preserving ancestry and enabling cross-branch object reuse.
  sync:
    name: Sync ${{ matrix.ack_branch }}
    needs: resolve
    if: needs.resolve.outputs.sync_count != '0'
    runs-on: ubuntu-latest
    timeout-minutes: 60

    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.resolve.outputs.sync_matrix) }}

    steps:
      - name: Disable IPv6
        shell: bash
        run: |
          set -euo pipefail
          sudo sysctl -w net.ipv6.conf.all.disable_ipv6=1
          sudo sysctl -w net.ipv6.conf.default.disable_ipv6=1
          sudo sysctl -w net.ipv6.conf.lo.disable_ipv6=1

      - name: Checkout mirror repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Configure git
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Clone upstream branch
        id: clone
        shell: bash
        run: |
          set -xuo pipefail

          ACK_BRANCH="${{ matrix.ack_branch }}"
          echo "ACK_BRANCH=$ACK_BRANCH" >> "$GITHUB_ENV"

          rm -rf /tmp/kernel-common

          set +e
          git clone \
            --depth=1 \
            --branch "$ACK_BRANCH" \
            "$UPSTREAM_URL" \
            /tmp/kernel-common
          clone_rc=$?
          set -e

          if [ "$clone_rc" -ne 0 ]; then
            echo "::warning::$ACK_BRANCH: upstream clone failed (rc=$clone_rc) — branch may not exist yet, skipping"
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          cd /tmp/kernel-common
          ACK_COMMIT=$(git rev-parse HEAD)
          ACK_SHORT=$(git rev-parse --short HEAD)
          KERNEL_VERSION=$(make kernelversion 2>/dev/null || true)

          echo "ACK_COMMIT=$ACK_COMMIT"                      >> "$GITHUB_ENV"
          echo "ACK_SHORT_COMMIT=$ACK_SHORT"                 >> "$GITHUB_ENV"
          echo "KERNEL_VERSION=${KERNEL_VERSION:-unknown}"   >> "$GITHUB_ENV"

      - name: Prepare target branch
        if: steps.clone.outputs.skip != 'true'
        shell: bash
        run: |
          set -euo pipefail
          TARGET_BRANCH="$ACK_BRANCH"

          if git ls-remote --exit-code --heads origin "$TARGET_BRANCH" >/dev/null 2>&1; then
            git fetch origin "$TARGET_BRANCH"
            git checkout -B "$TARGET_BRANCH" "origin/$TARGET_BRANCH"
          else
            git checkout --orphan "$TARGET_BRANCH"
            git rm -rf . >/dev/null 2>&1 || true
          fi

      - name: Replace branch contents
        if: steps.clone.outputs.skip != 'true'
        shell: bash
        run: |
          set -euo pipefail
          rsync -a --delete \
            --exclude='.git' \
            /tmp/kernel-common/ "$GITHUB_WORKSPACE/"

          cat > "$GITHUB_WORKSPACE/.mirror-info" <<EOF
          upstream=$UPSTREAM_URL
          branch=$ACK_BRANCH
          commit=$ACK_COMMIT
          kernel_version=$KERNEL_VERSION
          EOF

          git add -A

      - name: Commit and push
        if: steps.clone.outputs.skip != 'true'
        shell: bash
        run: |
          set -euo pipefail
          TARGET_BRANCH="$ACK_BRANCH"

          if git diff --cached --quiet; then
            echo "$TARGET_BRANCH: no changes, already current."
            exit 0
          fi

          if [ -n "${KERNEL_VERSION:-}" ] && [ "$KERNEL_VERSION" != "unknown" ]; then
            MSG="Sync ${TARGET_BRANCH} to Linux ${KERNEL_VERSION}"
          else
            MSG="Sync ${TARGET_BRANCH}"
          fi

          git commit -m "$MSG" \
            -m "Upstream: $UPSTREAM_URL" \
            -m "Branch: ${TARGET_BRANCH}" \
            -m "Commit: ${ACK_COMMIT}"

          set +e
          git push origin "HEAD:${TARGET_BRANCH}" --force-with-lease
          push_rc=$?
          set -e

          if [ "$push_rc" -ne 0 ]; then
            echo "::warning::$TARGET_BRANCH: push failed (rc=$push_rc) — will retry next run"
            exit 0
          fi

          echo "### Synced: $TARGET_BRANCH" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Field | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Upstream commit | \`$ACK_COMMIT\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Kernel version | \`$KERNEL_VERSION\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Source | [\`$TARGET_BRANCH\`]($UPSTREAM_URL/+log/$TARGET_BRANCH) |" \
            >> "$GITHUB_STEP_SUMMARY"

  # ── Job 3: prune ──────────────────────────────────────────────────────────
  # Deletes date-release branches that have been superseded by a newer one.
  # LTS branches are never touched — the script only enumerates date-release
  # branches (pattern: androidXX-X.XX-YYYY-MM) that belong to a managed family.
  prune:
    name: Prune superseded release branches
    needs: resolve
    if: needs.resolve.outputs.prune_count != '0'
    runs-on: ubuntu-latest

    steps:
      - name: Disable IPv6
        shell: bash
        run: |
          set -euo pipefail
          sudo sysctl -w net.ipv6.conf.all.disable_ipv6=1
          sudo sysctl -w net.ipv6.conf.default.disable_ipv6=1
          sudo sysctl -w net.ipv6.conf.lo.disable_ipv6=1

      - name: Checkout mirror repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Configure git
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Prune superseded branches
        shell: bash
        env:
          PRUNE_BRANCHES: ${{ needs.resolve.outputs.prune_branches }}
        run: |
          set -euo pipefail
          python3 - <<'EOF'
          import json
          import os
          import subprocess

          branches = json.loads(os.environ["PRUNE_BRANCHES"])
          print(f"Pruning {len(branches)} branch(es): {', '.join(branches)}")
          for branch in branches:
              subprocess.run(["git", "push", "origin", "--delete", branch], check=True)
          print(f"Pruned {len(branches)} branch(es).")
          EOF
