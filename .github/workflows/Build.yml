name: Build kernel

on:
  workflow_dispatch:
    inputs:
      source_type:
        description: "Source — lts: stock ACK · date: latest monthly ACK · custom: your repo"
        required: true
        default: "lts"
        type: choice
        options:
          - lts
          - date
          - custom
      kernel_version:
        description: "Kernel version (ignored for custom source)"
        required: true
        default: "android15-6.6"
        type: choice
        options:
          - android15-6.6
          - android14-6.1
          - android14-5.15
          - android13-5.15
          - android13-5.10
          - android12-5.10
          - android12-5.4
          - android11-5.4
          - all
      variant:
        description: "Build variant"
        required: true
        default: "vanilla"
        type: choice
        options:
          - vanilla
          - bbg
          - ksu
          - ksu-bbg
          - ksu-susfs
          - ksu-susfs-bbg
          - all
      custom_url:
        description: "Custom kernel git URL (source_type=custom only)"
        required: false
        default: ""
        type: string
      custom_branch:
        description: "Custom kernel branch, tag, or commit (source_type=custom only)"
        required: false
        default: ""
        type: string
      private_fragment:
        description: "Optional Kconfig fragment content layered last"
        required: false
        default: ""
        type: string
      disable_defconfig_check:
        description: "Disable defconfig normalization check"
        required: true
        default: true
        type: boolean
      disable_kmi_check:
        description: "Disable strict KMI checks"
        required: true
        default: false
        type: boolean
      build_env:
        description: "Extra build env KEY=VALUE lines (advanced)"
        required: false
        default: ""
        type: string

permissions:
  contents: read

jobs:
  # ── Job 1: resolve ────────────────────────────────────────────────────────
  # Maps inputs to a GitHub Actions build matrix. For date source, queries
  # origin for the latest mirrored date branch per family. For each
  # profile × variant, delegates compatibility checks to resolve-build-matrix.py.
  resolve:
    name: Resolve build matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.resolve.outputs.matrix }}
      count:  ${{ steps.resolve.outputs.count }}

    steps:
      - name: Disable IPv6
        shell: bash
        run: |
          set -euo pipefail
          sudo sysctl -w net.ipv6.conf.all.disable_ipv6=1
          sudo sysctl -w net.ipv6.conf.default.disable_ipv6=1
          sudo sysctl -w net.ipv6.conf.lo.disable_ipv6=1

      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Resolve matrix
        id: resolve
        shell: bash
        env:
          SOURCE_TYPE:    ${{ inputs.source_type }}
          KERNEL_VERSION: ${{ inputs.kernel_version }}
          VARIANT:        ${{ inputs.variant }}
          CUSTOM_URL:     ${{ inputs.custom_url }}
          CUSTOM_BRANCH:  ${{ inputs.custom_branch }}
        run: |
          set -euo pipefail
          RESULT=$(python3 scripts/resolve-unified-build-matrix.py)
          echo "matrix=$(echo "$RESULT" | jq -c '.matrix')" >> "$GITHUB_OUTPUT"
          echo "count=$(echo "$RESULT"  | jq -r '.count')"  >> "$GITHUB_OUTPUT"

          COUNT=$(echo "$RESULT" | jq -r '.count')
          echo "### Build matrix — ${{ inputs.source_type }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Kernel:** \`${{ inputs.kernel_version }}\` | **Variant:** \`${{ inputs.variant }}\` | **Builds:** $COUNT" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "$RESULT" | jq -r '
            .matrix.include[] |
            "- \(.label) / \(.variant)" +
            if .kernel_source_branch_override != "" then " ← \(.kernel_source_branch_override)" else "" end
          ' >> "$GITHUB_STEP_SUMMARY"

  # ── Job 2: build ──────────────────────────────────────────────────────────
  build:
    name: ${{ matrix.label }} / ${{ matrix.variant }}
    needs: resolve
    if: needs.resolve.outputs.count != '0'
    runs-on: ubuntu-24.04
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.resolve.outputs.matrix) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 1

      - name: Free Disk Space
        uses: endersonmenezes/free-disk-space@v3
        with:
          remove_android: true
          remove_dotnet: true
          remove_haskell: true
          remove_tool_cache: true
          remove_packages: "azure-cli google-cloud-cli microsoft-edge-stable google-chrome-stable firefox postgresql* temurin-* *llvm* mysql* dotnet-sdk-*"
          remove_packages_one_command: true
          remove_folders: "/usr/share/swift /usr/share/miniconda /usr/share/az* /usr/local/lib/node_modules /usr/local/share/chromium /usr/local/share/powershell /usr/local/julia /usr/local/aws-cli /usr/local/aws-sam-cli /usr/share/gradle"
          rm_cmd: "rmz"
          rmz_version: "3.1.1"
          testing: false

      - name: Disable IPv6
        shell: bash
        run: |
          set -euo pipefail
          sudo sysctl -w net.ipv6.conf.all.disable_ipv6=1
          sudo sysctl -w net.ipv6.conf.default.disable_ipv6=1
          sudo sysctl -w net.ipv6.conf.lo.disable_ipv6=1

      - name: Restore ccache
        uses: actions/cache@v5
        with:
          path: ~/.cache/ccache
          key: ccache-${{ runner.os }}-${{ matrix.profile }}-${{ hashFiles('profiles/*.json', 'scripts/**', 'configs/**') }}
          restore-keys: |
            ccache-${{ runner.os }}-${{ matrix.profile }}-
            ccache-${{ runner.os }}-

      - name: Install build tools
        shell: bash
        run: ./scripts/install-build-tools.sh

      - name: Setup ccache
        shell: bash
        run: ./scripts/setup-ccache.sh

      - name: Add swap
        shell: bash
        run: ./scripts/add-swap.sh 16 --aggressive

      - name: Ccache stats before build
        shell: bash
        run: ccache -s || true

      - name: Write private.fragment
        if: ${{ inputs.private_fragment != '' }}
        shell: bash
        run: |
          set -euo pipefail
          cat > private.fragment <<'EOF_PRIVATE_FRAGMENT'
          ${{ inputs.private_fragment }}
          EOF_PRIVATE_FRAGMENT

      - name: Prepare log metadata
        shell: bash
        run: |
          set -euo pipefail
          LOG_DIR="$GITHUB_WORKSPACE/.logs/${{ matrix.label }}/${{ matrix.variant }}"
          mkdir -p "$LOG_DIR"
          {
            echo "workflow=${{ github.workflow }}"
            echo "run_id=${{ github.run_id }}"
            echo "run_number=${{ github.run_number }}"
            echo "commit_sha=${{ github.sha }}"
            echo "source_type=${{ inputs.source_type }}"
            echo "profile=${{ matrix.profile }}"
            echo "variant=${{ matrix.variant }}"
            echo "label=${{ matrix.label }}"
            [ -n "${{ matrix.kernel_source_branch_override }}" ] && \
              echo "kernel_source_branch=${{ matrix.kernel_source_branch_override }}"
            [ -n "${{ matrix.kernel_common_url }}" ] && \
              echo "kernel_common_url=${{ matrix.kernel_common_url }}"
            date -u '+date_utc=%Y-%m-%dT%H:%M:%SZ'
          } > "$LOG_DIR/metadata.txt"

      - name: Build kernel
        shell: bash
        run: |
          set -euo pipefail
          LOG_DIR="$GITHUB_WORKSPACE/.logs/${{ matrix.label }}/${{ matrix.variant }}"
          mkdir -p "$LOG_DIR"
          export CORESHIFT_LOG_DIR="$LOG_DIR"

          build_env_args=()
          [ -n "${{ matrix.kernel_common_url }}" ] && \
            build_env_args+=(--build-env "KERNEL_COMMON_URL=${{ matrix.kernel_common_url }}")
          [ -n "${{ matrix.kernel_source_branch_override }}" ] && \
            build_env_args+=(--build-env "KERNEL_SOURCE_BRANCH_OVERRIDE=${{ matrix.kernel_source_branch_override }}")

          defconfig_check_arg="off"
          kmi_check_arg="off"
          [ "${{ inputs.disable_defconfig_check }}" = "true" ] && defconfig_check_arg="on"
          [ "${{ inputs.disable_kmi_check }}"      = "true" ] && kmi_check_arg="on"

          while IFS= read -r line; do
            line="${line#"${line%%[![:space:]]*}"}"
            line="${line%"${line##*[![:space:]]}"}"
            [ -n "$line" ] || continue
            case "$line" in \#*) continue ;; esac
            if [[ "$line" == export\ * ]]; then
              echo "::error::build_env lines must be KEY=VALUE only, without export: $line"
              exit 1
            fi
            if [[ "$line" != *=* ]]; then
              echo "::error::Invalid build_env line, expected KEY=VALUE: $line"
              exit 1
            fi
            key="${line%%=*}"
            if ! [[ "$key" =~ ^[A-Za-z_][A-Za-z0-9_]*$ ]]; then
              echo "::error::Invalid build_env key: $key"
              exit 1
            fi
            build_env_args+=(--build-env "$line")
          done <<'EOF_BUILD_ENV'
          ${{ inputs.build_env }}
          EOF_BUILD_ENV

          set +e
          ./scripts/build-kernel.sh "${{ matrix.profile }}" \
            --variant "${{ matrix.variant }}" \
            --disable-defconfig-check "$defconfig_check_arg" \
            --disable-kmi-check "$kmi_check_arg" \
            "${build_env_args[@]}" 2>&1 | tee "$LOG_DIR/build-kernel.log"
          status="${PIPESTATUS[0]}"
          echo "$status" > "$LOG_DIR/build-exit-code.txt"
          exit "$status"

      - name: Ccache stats after build
        if: always()
        shell: bash
        run: ccache -s || true

      - name: List AK3 zip artifacts
        shell: bash
        run: find "dist/${{ matrix.profile }}" -maxdepth 1 -name '*.zip' -type f -print

      - name: Upload AK3 artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.artifact_name }}-${{ github.run_number }}
          path: dist/${{ matrix.profile }}/*.zip
          if-no-files-found: error

      - name: Package logs
        if: always()
        shell: bash
        run: |
          ./scripts/collect-build-logs.sh "${{ matrix.profile }}" "${{ matrix.variant }}" \
            ".work/${{ matrix.profile }}" "dist/${{ matrix.profile }}"

      - name: Upload log artifact
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: logs-${{ matrix.label }}-${{ matrix.variant }}-${{ github.run_number }}
          path: dist/${{ matrix.profile }}/logs/*.zip
          if-no-files-found: warn
