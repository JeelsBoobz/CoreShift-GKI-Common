name: Build kernel (date branch)

on:
  workflow_dispatch:
    inputs:
      kernel_family:
        description: "Kernel family — builds the latest mirrored date branch for this family"
        required: true
        default: "android15-6.6"
        type: choice
        options:
          - android12-5.10
          - android13-5.10
          - android13-5.15
          - android14-5.15
          - android14-6.1
          - android15-6.6
      variant:
        description: "Build variant"
        required: true
        default: "vanilla"
        type: choice
        options:
          - vanilla
          - bbg
          - ksu
          - ksu-bbg
          - ksu-susfs
          - ksu-susfs-bbg
      private_fragment:
        description: "Optional Kconfig fragment content layered last. Leave empty for defaults."
        required: false
        default: ""
        type: string
      disable_defconfig_check:
        description: "Disable defconfig normalization check."
        required: true
        default: true
        type: boolean
      disable_kmi_check:
        description: "Disable strict KMI checks."
        required: true
        default: false
        type: boolean
      build_env:
        description: "Optional build env KEY=VALUE lines. One per line. Advanced users only."
        required: false
        default: ""
        type: string

permissions:
  contents: read

jobs:
  resolve:
    name: Resolve date branch
    runs-on: ubuntu-latest
    outputs:
      date_branch: ${{ steps.resolve.outputs.date_branch }}
      lts_profile:  ${{ steps.resolve.outputs.lts_profile }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Resolve latest date branch
        id: resolve
        shell: bash
        run: |
          set -euo pipefail

          FAMILY="${{ inputs.kernel_family }}"
          LTS_PROFILE="${FAMILY}-lts"

          # Find the latest mirrored date branch for this family that is <= today.
          DATE_BRANCH=$(python3 - "$FAMILY" <<'PY'
          import re
          import subprocess
          import sys
          from datetime import datetime, timezone

          family = sys.argv[1]
          pattern = re.compile(rf"refs/heads/({re.escape(family)}-(\d{{4}})-(\d{{2}}))$")

          result = subprocess.run(
              ["git", "ls-remote", "--heads", "origin"],
              capture_output=True, text=True, check=True,
          )

          now = datetime.now(tz=timezone.utc)
          current_ym = (f"{now.year:04d}", f"{now.month:02d}")

          candidates = []
          for line in result.stdout.splitlines():
              m = pattern.search(line)
              if not m:
                  continue
              branch, year, month = m.group(1), m.group(2), m.group(3)
              if (year, month) <= current_ym:
                  candidates.append((year, month, branch))

          if not candidates:
              print(f"error: no date branch found for {family}", file=sys.stderr)
              sys.exit(1)

          candidates.sort(reverse=True)
          print(candidates[0][2])
          PY
          )

          echo "date_branch=$DATE_BRANCH" >> "$GITHUB_OUTPUT"
          echo "lts_profile=$LTS_PROFILE"  >> "$GITHUB_OUTPUT"

          echo "### Date branch resolved" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Field | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Family | \`$FAMILY\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Date branch | \`$DATE_BRANCH\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Base profile | \`$LTS_PROFILE\` |" >> "$GITHUB_STEP_SUMMARY"

  build:
    name: Build ${{ needs.resolve.outputs.date_branch }} (${{ inputs.variant }})
    needs: resolve
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 1

      - name: Free Disk Space
        if: true
        uses: endersonmenezes/free-disk-space@v3
        with:
          remove_android: true
          remove_dotnet: true
          remove_haskell: true
          remove_tool_cache: false
          remove_swap: false
          testing: false

      - name: Disable IPv6
        shell: bash
        run: |
          set -euo pipefail
          sudo sysctl -w net.ipv6.conf.all.disable_ipv6=1
          sudo sysctl -w net.ipv6.conf.default.disable_ipv6=1
          sudo sysctl -w net.ipv6.conf.lo.disable_ipv6=1

      - name: Restore ccache
        uses: actions/cache@v5
        with:
          path: ~/.cache/ccache
          key: ccache-${{ runner.os }}-${{ needs.resolve.outputs.lts_profile }}-${{ hashFiles('profiles/*.json', 'scripts/**', 'configs/fragments/coreshift.fragment') }}
          restore-keys: |
            ccache-${{ runner.os }}-${{ needs.resolve.outputs.lts_profile }}-
            ccache-${{ runner.os }}-

      - name: Install build tools
        shell: bash
        run: ./scripts/install-build-tools.sh

      - name: Setup ccache
        shell: bash
        run: ./scripts/setup-ccache.sh

      - name: Add swap
        shell: bash
        run: ./scripts/add-swap.sh 16 --aggressive

      - name: Ccache stats before build
        shell: bash
        run: |
          ccache -s || true
          ccache --show-config || true

      - name: Write private.fragment
        if: ${{ inputs.private_fragment != '' }}
        shell: bash
        run: |
          set -euo pipefail
          cat > private.fragment <<'FRAGMENT_EOF'
          ${{ inputs.private_fragment }}
          FRAGMENT_EOF

      - name: Prepare log metadata
        shell: bash
        run: |
          set -euo pipefail
          PROFILE="${{ needs.resolve.outputs.lts_profile }}"
          DATE_BRANCH="${{ needs.resolve.outputs.date_branch }}"
          LOG_DIR="$GITHUB_WORKSPACE/.logs/$DATE_BRANCH/${{ inputs.variant }}"
          mkdir -p "$LOG_DIR"
          {
            echo "workflow=${{ github.workflow }}"
            echo "run_id=${{ github.run_id }}"
            echo "run_number=${{ github.run_number }}"
            echo "commit_sha=${{ github.sha }}"
            echo "ref_name=${{ github.ref_name }}"
            echo "profile=$PROFILE"
            echo "date_branch=$DATE_BRANCH"
            echo "variant=${{ inputs.variant }}"
            echo "runner_os=${{ runner.os }}"
            date -u '+date_utc=%Y-%m-%dT%H:%M:%SZ'
          } > "$LOG_DIR/metadata.txt"

      - name: Build kernel
        shell: bash
        run: |
          set -euo pipefail
          PROFILE="${{ needs.resolve.outputs.lts_profile }}"
          DATE_BRANCH="${{ needs.resolve.outputs.date_branch }}"
          LOG_DIR="$GITHUB_WORKSPACE/.logs/$DATE_BRANCH/${{ inputs.variant }}"
          mkdir -p "$LOG_DIR"
          export CORESHIFT_LOG_DIR="$LOG_DIR"

          build_env_args=()
          defconfig_check_arg="off"
          kmi_check_arg="off"

          if [ "${{ inputs.disable_defconfig_check }}" = "true" ]; then
            defconfig_check_arg="on"
          fi

          if [ "${{ inputs.disable_kmi_check }}" = "true" ]; then
            kmi_check_arg="on"
          fi

          while IFS= read -r line; do
            line="${line#"${line%%[![:space:]]*}"}"
            line="${line%"${line##*[![:space:]]}"}"
            [ -n "$line" ] || continue
            case "$line" in \#*) continue ;; esac
            if [[ "$line" == export\ * ]]; then
              echo "::error::build_env lines must be KEY=VALUE only, without export: $line"
              exit 1
            fi
            if [[ "$line" != *=* ]]; then
              echo "::error::Invalid build_env line, expected KEY=VALUE: $line"
              exit 1
            fi
            key="${line%%=*}"
            if ! [[ "$key" =~ ^[A-Za-z_][A-Za-z0-9_]*$ ]]; then
              echo "::error::Invalid build_env key: $key"
              exit 1
            fi
            build_env_args+=(--build-env "$line")
          done <<'EOF_BUILD_ENV'
          ${{ inputs.build_env }}
          EOF_BUILD_ENV

          set +e
          ./scripts/build-kernel.sh "$PROFILE" \
            --variant "${{ inputs.variant }}" \
            --disable-defconfig-check "$defconfig_check_arg" \
            --disable-kmi-check "$kmi_check_arg" \
            --build-env "KERNEL_SOURCE_BRANCH_OVERRIDE=$DATE_BRANCH" \
            "${build_env_args[@]}" 2>&1 | tee "$LOG_DIR/build-kernel.log"
          status="${PIPESTATUS[0]}"
          echo "$status" > "$LOG_DIR/build-exit-code.txt"
          exit "$status"

      - name: Ccache stats after build
        if: always()
        shell: bash
        run: ccache -s || true

      - name: Upload build artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: kernel-${{ needs.resolve.outputs.date_branch }}-${{ inputs.variant }}-${{ github.run_number }}
          path: |
            dist/${{ needs.resolve.outputs.lts_profile }}/
            .logs/${{ needs.resolve.outputs.date_branch }}/
          if-no-files-found: warn
          retention-days: 7
