name: Build variants

on:
  workflow_dispatch:
    inputs:
      kernel_version:
        description: "Kernel version — builds both LTS and latest date branch"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - android15-6.6
          - android14-6.1
          - android14-5.15
          - android13-5.15
          - android13-5.10
          - android12-5.10
          - android12-5.4
          - android11-5.4
      variant:
        description: "Variant to build"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - vanilla
          - bbg
          - ksu
          - ksu-bbg
          - ksu-susfs
          - ksu-susfs-bbg
          - kowsu
          - kowsu-bbg
          - kowsu-susfs
          - kowsu-susfs-bbg
      output_mode:
        description: "Output mode — artifacts: GitHub Actions artifact · release: GitHub pre-release"
        required: true
        default: "artifacts"
        type: choice
        options:
          - artifacts
          - release
      clean_build:
        description: "Clean build — skip ccache restore and setup"
        required: false
        default: false
        type: boolean
      clang_override:
        description: "Custom Clang from CoreShift releases (empty = ACK built-in)"
        required: false
        default: ""
        type: choice
        options:
          - ""
          - r584948
          - r547379
          - r536225
          - r510928
          - r487747c
          - r450784e
          - r416183b
      manifest_overlay_mode:
        description: "Manifest trim mode (empty = use profile default)"
        required: false
        default: ""
        type: choice
        options:
          - ""
          - safe
          - aggressive

permissions:
  contents: read

jobs:
  resolve:
    name: Resolve build matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.resolve.outputs.matrix }}
      count:  ${{ steps.resolve.outputs.count }}

    steps:
      - name: Disable IPv6
        shell: bash
        run: |
          set -euo pipefail
          sudo sysctl -w net.ipv6.conf.all.disable_ipv6=1
          sudo sysctl -w net.ipv6.conf.default.disable_ipv6=1
          sudo sysctl -w net.ipv6.conf.lo.disable_ipv6=1

      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Resolve matrix
        id: resolve
        shell: bash
        env:
          KERNEL_VERSION: ${{ inputs.kernel_version }}
          VARIANT:        ${{ inputs.variant }}
        run: |
          set -euo pipefail

          # LTS matrix
          LTS=$(SOURCE_TYPE=lts CUSTOM_URL="" CUSTOM_BRANCH="" \
            python3 scripts/resolve-unified-build-matrix.py)

          # Date matrix — skip for 5.4 (no date branches for pre-GKI)
          DATE='{"matrix":{"include":[]},"count":0}'
          case "$KERNEL_VERSION" in
            android11-5.4|android12-5.4)
              echo "Skipping date branches for $KERNEL_VERSION (pre-GKI 5.4)"
              ;;
            *)
              DATE=$(SOURCE_TYPE=date CUSTOM_URL="" CUSTOM_BRANCH="" \
                python3 scripts/resolve-unified-build-matrix.py) || \
                DATE='{"matrix":{"include":[]},"count":0}'
              ;;
          esac

          RESULT=$(python3 - "$LTS" "$DATE" <<'PY'
          import json, sys
          lts  = json.loads(sys.argv[1])
          date = json.loads(sys.argv[2])
          combined = lts["matrix"]["include"] + date["matrix"]["include"]
          print(json.dumps({"matrix": {"include": combined}, "count": len(combined)}))
          PY
          )

          COUNT=$(echo "$RESULT" | jq -r '.count')
          echo "matrix=$(echo "$RESULT" | jq -c '.matrix')" >> "$GITHUB_OUTPUT"
          echo "count=$COUNT"                               >> "$GITHUB_OUTPUT"

          echo "### Build matrix" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Kernel:** \`$KERNEL_VERSION\` | **Variant:** \`$VARIANT\` | **Builds:** $COUNT" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "$RESULT" | jq -r '
            .matrix.include[] |
            "- \(.label) / \(.variant)" +
            if .kernel_source_branch_override != "" then " ← \(.kernel_source_branch_override)" else "" end
          ' >> "$GITHUB_STEP_SUMMARY"

  build:
    name: ${{ matrix.label }} / ${{ matrix.variant }}
    needs: resolve
    if: needs.resolve.outputs.count != '0'
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.resolve.outputs.matrix) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 1

      - name: Free Disk Space
        uses: endersonmenezes/free-disk-space@v3
        with:
          remove_android: true
          remove_dotnet: true
          remove_haskell: true
          remove_tool_cache: true
          remove_packages: "azure-cli google-cloud-cli microsoft-edge-stable google-chrome-stable firefox postgresql* temurin-* *llvm* mysql* dotnet-sdk-*"
          remove_packages_one_command: true
          remove_folders: "/usr/share/swift /usr/share/miniconda /usr/share/az* /usr/local/lib/node_modules /usr/local/share/chromium /usr/local/share/powershell /usr/local/julia /usr/local/aws-cli /usr/local/aws-sam-cli /usr/share/gradle"
          rm_cmd: "rmz"
          rmz_version: "3.1.1"
          testing: false

      - name: Disable IPv6
        shell: bash
        run: |
          set -euo pipefail
          sudo sysctl -w net.ipv6.conf.all.disable_ipv6=1
          sudo sysctl -w net.ipv6.conf.default.disable_ipv6=1
          sudo sysctl -w net.ipv6.conf.lo.disable_ipv6=1

      - name: Restore ccache
        if: ${{ inputs.clean_build != true }}
        uses: actions/cache@v5
        with:
          path: ~/.cache/ccache
          key: ccache-${{ runner.os }}-${{ matrix.profile }}-${{ hashFiles('profiles/*.json', 'configs/**') }}
          restore-keys: |
            ccache-${{ runner.os }}-${{ matrix.profile }}-
            ccache-${{ runner.os }}-

      - name: Install build tools
        shell: bash
        run: ./scripts/install-build-tools.sh

      - name: Setup ccache
        if: ${{ inputs.clean_build != true }}
        shell: bash
        run: ./scripts/setup-ccache.sh

      - name: Add swap
        shell: bash
        run: ./scripts/add-swap.sh 16 --aggressive

      - name: Ccache stats before build
        if: ${{ inputs.clean_build != true }}
        shell: bash
        run: ccache -s || true

      - name: Download custom Clang
        if: ${{ inputs.clang_override != '' }}
        id: clang-download
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          VERSION="${{ inputs.clang_override }}"
          CLANG_DIR="$GITHUB_WORKSPACE/clang-override"
          mkdir -p "$CLANG_DIR"
          ASSET_URL=$(gh api repos/CoreShiftD/android_kernel_common_lts/releases/tags/aosp-clang-toolchains \
            --jq ".assets[] | select(.name | startswith(\"clang-${VERSION}-linux-x86\") and endswith(\".tar.zst\")) | .browser_download_url" \
            | head -1)
          if [ -z "$ASSET_URL" ]; then
            echo "::error::No clang asset found for version ${VERSION} in aosp-clang-toolchains release"
            exit 1
          fi
          echo "Downloading $ASSET_URL"
          curl -fL "$ASSET_URL" | zstd -d | tar -xC "$CLANG_DIR" --strip-components=1
          CLANG_BIN="$CLANG_DIR/bin"
          echo "clang_prebuilt_bin=$CLANG_BIN" >> "$GITHUB_OUTPUT"
          echo "Custom clang: $("$CLANG_BIN/clang" --version | head -1)"

      - name: Prepare log metadata
        shell: bash
        run: |
          set -euo pipefail
          LOG_DIR="$GITHUB_WORKSPACE/.logs/${{ matrix.label }}/${{ matrix.variant }}"
          mkdir -p "$LOG_DIR"
          {
            echo "workflow=${{ github.workflow }}"
            echo "run_id=${{ github.run_id }}"
            echo "run_number=${{ github.run_number }}"
            echo "commit_sha=${{ github.sha }}"
            echo "profile=${{ matrix.profile }}"
            echo "variant=${{ matrix.variant }}"
            echo "label=${{ matrix.label }}"
            [ -n "${{ matrix.kernel_source_branch_override }}" ] && \
              echo "kernel_source_branch=${{ matrix.kernel_source_branch_override }}"
            date -u '+date_utc=%Y-%m-%dT%H:%M:%SZ'
          } > "$LOG_DIR/metadata.txt"

      - name: Build kernel
        shell: bash
        run: |
          set -euo pipefail
          LOG_DIR="$GITHUB_WORKSPACE/.logs/${{ matrix.label }}/${{ matrix.variant }}"
          mkdir -p "$LOG_DIR"
          export CORESHIFT_LOG_DIR="$LOG_DIR"

          build_env_args=()
          [ -n "${{ matrix.kernel_source_branch_override }}" ] && \
            build_env_args+=(--build-env "KERNEL_SOURCE_BRANCH_OVERRIDE=${{ matrix.kernel_source_branch_override }}")
          [ -n "${{ steps.clang-download.outputs.clang_prebuilt_bin }}" ] && \
            build_env_args+=(--build-env "CLANG_PREBUILT_BIN=${{ steps.clang-download.outputs.clang_prebuilt_bin }}")
          [ -n "${{ inputs.manifest_overlay_mode }}" ] && \
            build_env_args+=(--build-env "CORESHIFT_MANIFEST_OVERLAY_MODE=${{ inputs.manifest_overlay_mode }}")

          set +e
          ./scripts/build-kernel.sh "${{ matrix.profile }}" \
            --variant "${{ matrix.variant }}" \
            --disable-defconfig-check on \
            "${build_env_args[@]}" 2>&1 | tee "$LOG_DIR/build-kernel.log"
          status="${PIPESTATUS[0]}"
          echo "$status" > "$LOG_DIR/build-exit-code.txt"
          exit "$status"

      - name: Ccache stats after build
        id: ccache-stats
        if: ${{ always() && inputs.clean_build != true }}
        shell: bash
        run: ./scripts/collect-ccache-stats.sh

      - name: List AK3 zip artifacts
        shell: bash
        run: find "dist/${{ matrix.profile }}" -maxdepth 1 -name '*.zip' -type f -print

      - name: Extract AK3 for artifact upload
        if: inputs.output_mode == 'artifacts'
        shell: bash
        run: |
          set -euo pipefail
          zip_path="$(find "dist/${{ matrix.profile }}" -maxdepth 1 -name '*.zip' -type f | head -1)"
          mkdir -p "dist/${{ matrix.profile }}/ak3-upload"
          unzip -q "$zip_path" -d "dist/${{ matrix.profile }}/ak3-upload"

      - name: Upload AK3 artifact
        if: inputs.output_mode == 'artifacts'
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.artifact_name }}-${{ github.run_number }}
          path: dist/${{ matrix.profile }}/ak3-upload/
          if-no-files-found: error

      - name: Upload AK3 to release
        if: inputs.output_mode == 'release'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          TAG="build-${{ github.run_number }}"
          gh release create "$TAG" \
            --title "Build #${{ github.run_number }} (${{ inputs.kernel_version }} / ${{ inputs.variant }})" \
            --prerelease \
            --notes "Automated build from run #${{ github.run_number }}." \
            2>/dev/null || true
          zip_path="$(find "dist/${{ matrix.profile }}" -maxdepth 1 -name '*.zip' -type f | head -1)"
          base="${zip_path##*/}"; base="${base%.zip}"
          clean_name="${base%%-CoreShift*}-${{ matrix.variant }}.zip"
          mv "$zip_path" "dist/${{ matrix.profile }}/$clean_name"
          gh release upload "$TAG" "dist/${{ matrix.profile }}/$clean_name" --clobber

      - name: Package logs
        if: always()
        shell: bash
        run: |
          ./scripts/collect-build-logs.sh "${{ matrix.profile }}" "${{ matrix.variant }}" \
            ".work/${{ matrix.profile }}" "dist/${{ matrix.profile }}"

      - name: Upload log artifact
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: logs-${{ matrix.label }}-${{ matrix.variant }}-${{ github.run_number }}
          path: dist/${{ matrix.profile }}/logs/*.zip
          if-no-files-found: warn
