name: Build ACK/GKI variants

on:
  workflow_dispatch:
    inputs:
      profile:
        description: "Optional profile filter. Leave empty to build every allowed profile/variant entry."
        required: false
        default: ""
        type: string
      variant:
        description: "Optional variant filter. Leave empty to build every allowed variant for the selected profile(s)."
        required: false
        default: ""
        type: string

permissions:
  contents: read

jobs:
  resolve-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.resolve.outputs.matrix }}
      count: ${{ steps.resolve.outputs.count }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 1

      - name: Resolve build matrix
        id: resolve
        shell: bash
        run: |
          set -euo pipefail

          args=()
          if [ -n "${{ inputs.profile }}" ]; then
            args+=(--profile "${{ inputs.profile }}")
          fi
          if [ -n "${{ inputs.variant }}" ]; then
            args+=(--variant "${{ inputs.variant }}")
          fi

          matrix_json="$(python3 scripts/resolve-build-matrix.py "${args[@]}")"
          matrix_count="$(python3 - <<'PY' "$matrix_json"
          import json
          import sys

          data = json.loads(sys.argv[1])
          print(len(data["include"]))
          PY
          )"

          echo "matrix=$matrix_json" >> "$GITHUB_OUTPUT"
          echo "count=$matrix_count" >> "$GITHUB_OUTPUT"

          matrix_file="$(mktemp)"
          printf '%s\n' "$matrix_json" > "$matrix_file"
          python3 scripts/write-matrix-summary.py "$matrix_file" >> "$GITHUB_STEP_SUMMARY"

  build:
    needs: resolve-matrix
    if: needs.resolve-matrix.outputs.count != '0'
    name: ${{ matrix.profile }} / ${{ matrix.variant }}
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.resolve-matrix.outputs.matrix) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Restore ccache
        uses: actions/cache@v5
        with:
          path: ~/.cache/ccache
          key: ccache-${{ runner.os }}-${{ matrix.profile }}-${{ hashFiles('profiles/*.json', 'scripts/**', 'configs/**') }}
          restore-keys: |
            ccache-${{ runner.os }}-${{ matrix.profile }}-
            ccache-${{ runner.os }}-

      - name: Install build tools
        shell: bash
        run: ./scripts/install-build-tools.sh

      - name: Setup ccache
        shell: bash
        run: ./scripts/setup-ccache.sh

      - name: Add swap
        shell: bash
        run: ./scripts/add-swap.sh 16 --aggressive

      - name: Prepare log metadata
        shell: bash
        run: |
          set -euo pipefail
          LOG_DIR="$GITHUB_WORKSPACE/.logs/${{ matrix.profile }}/${{ matrix.variant }}"
          mkdir -p "$LOG_DIR"
          {
            echo "workflow=${{ github.workflow }}"
            echo "run_id=${{ github.run_id }}"
            echo "run_number=${{ github.run_number }}"
            echo "commit_sha=${{ github.sha }}"
            echo "ref_name=${{ github.ref_name }}"
            echo "profile=${{ matrix.profile }}"
            echo "variant=${{ matrix.variant }}"
            echo "runner_os=${{ runner.os }}"
            date -u '+date_utc=%Y-%m-%dT%H:%M:%SZ'
          } > "$LOG_DIR/metadata.txt"

      - name: Build kernel
        shell: bash
        run: |
          set -euo pipefail
          LOG_DIR="$GITHUB_WORKSPACE/.logs/${{ matrix.profile }}/${{ matrix.variant }}"
          mkdir -p "$LOG_DIR"
          export CORESHIFT_LOG_DIR="$LOG_DIR"

          set +e
          ./scripts/build-kernel.sh "${{ matrix.profile }}" \
            --variant "${{ matrix.variant }}" \
            --disable-defconfig-check on 2>&1 | tee "$LOG_DIR/build-kernel.log"
          status="${PIPESTATUS[0]}"
          echo "$status" > "$LOG_DIR/build-exit-code.txt"
          exit "$status"

      - name: Upload AK3 artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.artifact_name }}-${{ github.run_number }}
          path: dist/${{ matrix.profile }}/*.zip
          if-no-files-found: error

      - name: Package logs
        if: always()
        shell: bash
        run: |
          ./scripts/collect-build-logs.sh "${{ matrix.profile }}" "${{ matrix.variant }}" ".work/${{ matrix.profile }}" "dist/${{ matrix.profile }}"

      - name: Upload log artifact
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: logs-${{ matrix.profile }}-${{ matrix.variant }}-${{ github.run_number }}
          path: dist/${{ matrix.profile }}/logs/*.zip
          if-no-files-found: warn
