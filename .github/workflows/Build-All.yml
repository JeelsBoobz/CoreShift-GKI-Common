name: Build all ACK/GKI profiles

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        profile:
          - android11-5.4-lts
          - android12-5.4-lts
          - android12-5.10-lts
          - android13-5.10-lts
          - android13-5.15-lts
          - android14-5.15-lts
          - android14-6.1-lts
          - android15-6.6-lts
          - android16-6.12-lts

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Restore ccache
        uses: actions/cache@v5
        with:
          path: ~/.cache/ccache
          key: ccache-${{ runner.os }}-${{ matrix.profile }}-${{ hashFiles('profiles/*.json', 'scripts/**', 'configs/fragments/coreshift.fragment') }}
          restore-keys: |
            ccache-${{ runner.os }}-${{ matrix.profile }}-
            ccache-${{ runner.os }}-

      - name: Install build tools
        shell: bash
        run: ./scripts/install-build-tools.sh

      - name: Setup ccache
        shell: bash
        run: ./scripts/setup-ccache.sh

      - name: Add swap
        shell: bash
        run: ./scripts/add-swap.sh 16 --aggressive

      - name: Ccache stats before build
        shell: bash
        run: |
          ccache -s || true
          ccache --show-config || true

      - name: Prepare log metadata
        shell: bash
        run: |
          set -euo pipefail
          LOG_DIR="$GITHUB_WORKSPACE/.logs/${{ matrix.profile }}/vanilla"
          mkdir -p "$LOG_DIR"
          {
            echo "workflow=${{ github.workflow }}"
            echo "run_id=${{ github.run_id }}"
            echo "run_number=${{ github.run_number }}"
            echo "commit_sha=${{ github.sha }}"
            echo "ref_name=${{ github.ref_name }}"
            echo "profile=${{ matrix.profile }}"
            echo "variant=vanilla"
            echo "runner_os=${{ runner.os }}"
            date -u '+date_utc=%Y-%m-%dT%H:%M:%SZ'
          } > "$LOG_DIR/metadata.txt"

      - name: Build kernel
        shell: bash
        run: |
          set -euo pipefail
          LOG_DIR="$GITHUB_WORKSPACE/.logs/${{ matrix.profile }}/vanilla"
          mkdir -p "$LOG_DIR"
          export CORESHIFT_LOG_DIR="$LOG_DIR"

          # This workflow intentionally exposes no options.
          # It is for batch-testing all supported profiles.
          # Per-profile customization belongs in Build.yml or local scripts/build-kernel.sh usage.
          set +e
          ./scripts/build-kernel.sh "${{ matrix.profile }}" \
            --variant vanilla \
            --disable-defconfig-check on 2>&1 | tee "$LOG_DIR/build-kernel.log"
          status="${PIPESTATUS[0]}"
          echo "$status" > "$LOG_DIR/build-exit-code.txt"
          exit "$status"

      - name: Ccache stats after build
        if: always()
        shell: bash
        run: |
          ccache -s || true
          ccache --show-config || true

      - name: List AK3 zip artifacts
        shell: bash
        run: find "dist/${{ matrix.profile }}" -maxdepth 1 -name '*.zip' -type f -print

      - name: Upload AK3 artifact
        uses: actions/upload-artifact@v6
        with:
          name: ak3-${{ matrix.profile }}-${{ github.run_number }}
          path: dist/${{ matrix.profile }}/*.zip
          if-no-files-found: error

      - name: Package logs
        if: always()
        shell: bash
        run: |
          ./scripts/collect-build-logs.sh "${{ matrix.profile }}" "vanilla" ".work/${{ matrix.profile }}" "dist/${{ matrix.profile }}"

      - name: Upload log artifact
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: logs-${{ matrix.profile }}-vanilla-${{ github.run_number }}
          path: dist/${{ matrix.profile }}/logs/*.zip
          if-no-files-found: warn
